server:
  port: 8080
  tomcat:
    max-http-form-post-size: 20MB
    max-swallow-size: 20MB

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tauri_mark?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    property-naming-strategy: SNAKE_CASE

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.taurimark.entity

jwt:
  secret: tauri-mark-secret-key-2024-very-long-and-secure
  expiration: 86400000  # 24 hours in milliseconds
